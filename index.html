<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command — Rajat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg-elev: #11141b;
    --surface: #161a23;
    --surface-2: #1d2230;
    --surface-3: #252b3b;
    --border: #262c3c;
    --border-strong: #353d52;
    --text: #e8ebf2;
    --text-dim: #8b94a8;
    --text-faint: #5a6378;
    --accent: #d4a373;
    --accent-soft: #c08552;
    --accent-glow: rgba(212, 163, 115, 0.15);
    --hot: #e84855;
    --warm: #f4a261;
    --cool: #6c8eaf;
    --cold: #5a6378;
    --p0: #e84855;
    --p1: #f4a261;
    --p2: #6c8eaf;
    --green: #67b26f;
    --purple: #a288d9;
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
    --shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Subtle ambient gradient */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -20%;
    width: 70%; height: 80%;
    background: radial-gradient(ellipse at center, var(--accent-glow) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .app {
    display: grid;
    grid-template-columns: 260px 1fr;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-elev);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .brand {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .brand h1 {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .brand h1 span { color: var(--accent); }
  .brand .subtitle {
    font-size: 10.5px;
    color: var(--text-faint);
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .quick-capture {
    padding: 12px;
    border-bottom: 1px solid var(--border);
  }
  .qc-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12.5px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .qc-input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface-2);
  }
  .qc-input::placeholder { color: var(--text-faint); }
  .qc-hint {
    font-size: 10px;
    color: var(--text-faint);
    margin-top: 4px;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.3;
  }
  .qc-hint kbd {
    background: var(--surface-2);
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 9.5px;
    border: 1px solid var(--border);
  }

  .nav {
    padding: 10px 8px 8px;
    border-bottom: 1px solid var(--border);
  }
  .nav-section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    padding: 8px 12px 4px;
    font-weight: 600;
  }
  .nav-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text-dim);
    transition: all 0.12s;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active {
    background: var(--surface-2);
    color: var(--text);
    box-shadow: inset 2px 0 0 var(--accent);
  }
  .nav-item .label {
    display: flex; align-items: center; gap: 8px;
  }
  .nav-item .icon {
    width: 14px; opacity: 0.7;
    font-size: 12px;
  }
  .nav-item .status-dot {
    /* Match the icon slot width so labels align with other nav items */
    margin-left: 4px;
    margin-right: 4px;
  }
  .nav-item .count {
    font-size: 10.5px;
    color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }
  .nav-item.active .count { color: var(--accent); }
  .nav-item .count.alert { color: var(--hot); }

  .accounts-section {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .accounts-header {
    padding: 12px 16px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .accounts-header h3 {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-faint);
    font-weight: 600;
  }
  .add-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 22px; height: 22px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
    display: grid;
    place-items: center;
    transition: all 0.15s;
  }
  .add-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }

  .accounts-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
  }
  .account-row {
    padding: 7px 10px;
    border-radius: 5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    color: var(--text-dim);
    transition: all 0.1s;
  }
  .account-row:hover { background: var(--surface); color: var(--text); }
  .account-row.active {
    background: var(--surface-2);
    color: var(--text);
    box-shadow: inset 2px 0 0 var(--accent);
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.Hot { background: var(--hot); box-shadow: 0 0 8px var(--hot); }
  .status-dot.Warm { background: var(--warm); }
  .status-dot.InTouch { background: var(--cool); }
  .status-dot.Cold { background: var(--cold); }
  .account-row .name {
    flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .account-row .badges { display: flex; gap: 3px; align-items: center; }
  .badge-dot {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 0 5px;
    border-radius: 3px;
    background: var(--surface-2);
    color: var(--text-faint);
    line-height: 14px;
    height: 15px;
    display: inline-flex; align-items: center;
  }
  .badge-dot.urgent { color: var(--hot); background: rgba(232,72,85,0.12); }
  .badge-dot.stale { color: var(--warm); background: rgba(244,162,97,0.1); }

  /* Main */
  .main {
    overflow-y: auto;
    background: var(--bg);
    position: relative;
  }
  .main-inner {
    padding: 28px 36px 80px;
    max-width: 1500px;
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 22px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    gap: 16px;
  }
  .page-title h2 {
    font-family: 'Fraunces', serif;
    font-size: 30px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 5px;
  }
  .page-title .meta {
    color: var(--text-dim);
    font-size: 13px;
  }
  .page-title .meta strong { color: var(--text); font-weight: 500; }
  .page-title .meta .alert-text { color: var(--hot); font-weight: 500; }

  .header-actions { display: flex; gap: 6px; }
  .btn {
    padding: 7px 13px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    font-size: 12.5px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }
  .btn:hover { background: var(--surface-3); border-color: var(--border-strong); }
  .btn-primary {
    background: var(--accent);
    color: #1a1410;
    border-color: var(--accent);
    font-weight: 500;
  }
  .btn-primary:hover { background: var(--accent-soft); border-color: var(--accent-soft); }
  .btn-ghost { background: transparent; color: var(--text-dim); }
  .btn-ghost:hover { color: var(--text); background: var(--surface-2); }
  .btn-danger { background: transparent; border-color: var(--border); color: var(--hot); }
  .btn-danger:hover { background: rgba(232, 72, 85, 0.1); }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Stat row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: all 0.15s;
  }
  .stat-card.clickable { cursor: pointer; }
  .stat-card.clickable:hover { border-color: var(--border-strong); transform: translateY(-1px); }
  .stat-card .label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .stat-card .value {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1;
  }
  .stat-card .value.alert { color: var(--hot); }
  .stat-card .value.warn { color: var(--warm); }
  .stat-card .value.good { color: var(--green); }
  .stat-card .sub {
    font-size: 11.5px;
    color: var(--text-dim);
    margin-top: 5px;
  }

  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 500;
    margin: 22px 0 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: -0.01em;
  }
  .section-title .badge {
    background: var(--surface-2);
    color: var(--text-dim);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
  }
  .section-title .badge.alert { background: rgba(232,72,85,0.15); color: var(--hot); }
  .section-title .toggle-done {
    margin-left: auto;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 12px;
    color: var(--text-faint);
    cursor: pointer;
  }
  .section-title .toggle-done:hover { color: var(--text-dim); }

  /* Task list */
  .tasks-container {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .task-row {
    display: grid;
    grid-template-columns: 22px 1fr 60px 120px 100px 60px;
    gap: 10px;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    cursor: pointer;
    transition: background 0.08s;
  }
  .task-row:last-child { border-bottom: none; }
  .task-row:hover { background: var(--surface-2); }
  .task-row.done .task-title { text-decoration: line-through; color: var(--text-faint); }
  .task-row.done { opacity: 0.55; }
  .task-row.snoozed { opacity: 0.6; background: rgba(162, 136, 217, 0.04); }

  .task-checkbox {
    width: 16px; height: 16px;
    border: 1.5px solid var(--border-strong);
    border-radius: 4px;
    cursor: pointer;
    display: grid;
    place-items: center;
    transition: all 0.15s;
    background: transparent;
    flex-shrink: 0;
  }
  .task-checkbox:hover { border-color: var(--accent); }
  .task-checkbox.checked {
    background: var(--green);
    border-color: var(--green);
    color: white;
    font-size: 10px;
    font-weight: 700;
  }

  .task-main { overflow: hidden; min-width: 0; }
  .task-title {
    font-size: 13.5px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .task-context {
    font-size: 11.5px;
    color: var(--text-faint);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .task-context .sep { color: var(--text-faint); margin: 0 5px; opacity: 0.5; }
  .task-context .inbox-tag {
    background: rgba(162, 136, 217, 0.15);
    color: var(--purple);
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10.5px;
    font-weight: 500;
  }

  .pri-tag {
    display: inline-block;
    padding: 1.5px 6px 2px;
    border-radius: 3px;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
    font-family: 'JetBrains Mono', monospace;
    text-align: center;
    min-width: 28px;
  }
  .pri-tag.P0 { background: rgba(232, 72, 85, 0.18); color: var(--p0); }
  .pri-tag.P1 { background: rgba(244, 162, 97, 0.16); color: var(--p1); }
  .pri-tag.P2 { background: rgba(108, 142, 175, 0.16); color: var(--p2); }

  .task-deadline {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .task-deadline.overdue { color: var(--hot); font-weight: 500; }
  .task-deadline.due-soon { color: var(--warm); }
  .task-deadline.snoozed-tag { color: var(--purple); }

  .status-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10.5px;
    font-weight: 500;
    background: var(--surface-2);
    color: var(--text-dim);
    text-align: center;
  }
  .status-pill.InProgress { background: rgba(108, 142, 175, 0.18); color: #8eb1d4; }
  .status-pill.Blocked { background: rgba(232, 72, 85, 0.15); color: var(--hot); }
  .status-pill.Done { background: rgba(103, 178, 111, 0.15); color: var(--green); }

  .task-actions {
    display: flex;
    gap: 1px;
    opacity: 0;
    transition: opacity 0.1s;
    justify-content: flex-end;
  }
  .task-row:hover .task-actions { opacity: 1; }
  .icon-btn {
    background: transparent;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
    font-size: 13px;
    transition: all 0.1s;
    line-height: 1;
  }
  .icon-btn:hover { background: var(--surface-3); color: var(--text); }
  .icon-btn.danger:hover { color: var(--hot); }

  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--text-faint);
    font-size: 13px;
  }
  .empty-state .big {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  /* Account detail */
  .account-meta-row {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
    font-size: 12.5px;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .meta-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .meta-chip .label {
    font-size: 10.5px;
    color: var(--text-faint);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .status-pill-large {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .status-pill-large.Hot { background: rgba(232, 72, 85, 0.18); color: var(--hot); }
  .status-pill-large.Warm { background: rgba(244, 162, 97, 0.15); color: var(--warm); }
  .status-pill-large.InTouch { background: rgba(108, 142, 175, 0.15); color: var(--cool); }
  .status-pill-large.Cold { background: rgba(90, 99, 120, 0.2); color: var(--cold); }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 14px;
    margin-top: 8px;
  }
  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
  }
  .project-card:hover { border-color: var(--border-strong); }
  .project-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }
  .project-name {
    font-family: 'Fraunces', serif;
    font-size: 15.5px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.3;
    color: var(--text);
  }
  .project-commercials {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin: 8px 0;
    padding: 10px;
    background: var(--surface-2);
    border-radius: 6px;
    font-size: 11.5px;
  }
  .project-commercials .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .project-commercials .key {
    color: var(--text-faint);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .project-commercials .val {
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    font-weight: 500;
  }
  .project-commercials .val.weighted { color: var(--accent); }
  .stage-tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .stage-tag.Discovery { background: rgba(108,142,175,0.15); color: var(--cool); }
  .stage-tag.POC { background: rgba(162,136,217,0.18); color: var(--purple); }
  .stage-tag.Proposal { background: rgba(244,162,97,0.15); color: var(--warm); }
  .stage-tag.Negotiation { background: rgba(232,72,85,0.15); color: var(--hot); }
  .stage-tag.Closed-Won { background: rgba(103,178,111,0.18); color: var(--green); }
  .stage-tag.Closed-Lost { background: rgba(90,99,120,0.2); color: var(--cold); }
  .stage-tag.OnHold { background: rgba(90,99,120,0.2); color: var(--cold); }

  .project-tasks {
    border-top: 1px solid var(--border);
    margin-top: 8px;
    padding-top: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    flex: 1;
  }
  .mini-task {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12.5px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 5px 6px;
    border-radius: 4px;
    margin: 0 -6px;
  }
  .mini-task:hover { background: var(--surface-2); }
  .mini-task.done { text-decoration: line-through; color: var(--text-faint); }
  .mini-task.snoozed { opacity: 0.65; }
  .mini-task .mini-check {
    width: 13px; height: 13px;
    border: 1.5px solid var(--border-strong);
    border-radius: 3px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    font-size: 9px;
    color: white;
  }
  .mini-task .mini-check.checked { background: var(--green); border-color: var(--green); }
  .mini-task .title {
    flex: 1; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .mini-task .pri-tag { flex-shrink: 0; }
  .mini-task .due {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--text-faint);
    flex-shrink: 0;
  }
  .mini-task .due.overdue { color: var(--hot); }
  .mini-task .due.due-soon { color: var(--warm); }

  .show-done-link {
    font-size: 11.5px;
    color: var(--text-faint);
    cursor: pointer;
    padding: 6px 6px 0;
    user-select: none;
  }
  .show-done-link:hover { color: var(--text-dim); }

  .add-task-inline {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 5px;
    color: var(--text-faint);
    padding: 6px;
    width: 100%;
    cursor: pointer;
    font-size: 12px;
    margin-top: 6px;
    font-family: inherit;
  }
  .add-task-inline:hover { color: var(--text-dim); border-color: var(--border-strong); background: var(--surface-2); }

  /* Pipeline / Kanban */
  .kanban {
    display: grid;
    grid-template-columns: repeat(6, minmax(220px, 1fr));

<script>
// ================= STATE & PERSISTENCE =================
const STORAGE_KEY = 'embAccountCommand_v2';
const LEGACY_KEY = 'embAccountCommand_v1';

const SEED_ACCOUNTS = [
  {name: 'BCG', type: 'Enterprise', category: 'Engagement', status: 'Hot', oppValue: 20000000},
  {name: 'Aditya Birla Group', type: 'Enterprise', category: 'Prospect', status: 'Hot', oppValue: 20000000},
  {name: 'ReNew', type: 'Enterprise', category: 'Engagement', status: 'Hot', oppValue: 30000000,
    seedProjects: [
      {name: 'Contract & Payment', stage: 'Negotiation', value: 0, prob: 80},
      {name: 'Procurement Planning', stage: 'Proposal', value: 5000000, prob: 60},
      {name: 'MES', stage: 'Proposal', value: 5500000, prob: 55},
      {name: 'OCR Cognifirst', stage: 'POC', value: 0, prob: 40},
      {name: 'Event Management Platform', stage: 'POC', value: 0, prob: 35},
      {name: 'Pro Vakeel', stage: 'Discovery', value: 0, prob: 25}
    ]},
  {name: 'Honda', type: 'Enterprise', category: 'Engagement', status: 'Hot', oppValue: 20000000},
  {name: 'Zydus Wellness', type: 'Enterprise', category: 'Prospect', status: 'Hot', oppValue: 5000000},
  {name: 'SembCorp', type: 'Enterprise', category: 'Prospect', status: 'Hot', oppValue: 10000000},
  {name: 'Azure Power', type: 'Enterprise', category: 'Prospect', status: 'Hot', oppValue: 20000000},
  {name: 'Naturis Cosmetics', type: 'Mid Market', category: 'Prospect', status: 'Hot', oppValue: 0},
  {name: 'SRS India', type: 'Mid Market', category: 'Prospect', status: 'Hot', oppValue: 0},
  {name: 'IDCUBE', type: 'Mid Market', category: 'Prospect', status: 'Hot', oppValue: 0},
  {name: 'EY', type: 'Enterprise', category: 'Prospect', status: 'Warm', oppValue: 0},
  {name: 'HUL', type: 'Enterprise', category: 'Prospect', status: 'Warm', oppValue: 10000000},
  {name: 'Shapoorji', type: 'Enterprise', category: 'Prospect', status: 'Warm', oppValue: 0},
  {name: 'Unicus', type: 'Enterprise', category: 'Prospect', status: 'Warm', oppValue: 0},
  {name: 'Biocon', type: 'Enterprise', category: 'Prospect', status: 'Warm', oppValue: 0},
  {name: 'Poly Cabs', type: 'Enterprise', category: 'Prospect', status: 'Warm', oppValue: 0},
  {name: 'CK Birla', type: 'Enterprise', category: 'Prospect', status: 'In Touch', oppValue: 0},
  {name: 'Siyarams', type: 'Enterprise', category: 'Prospect', status: 'In Touch', oppValue: 0},
  {name: 'AIPL Group', type: 'Enterprise', category: 'Prospect', status: 'In Touch', oppValue: 0},
  {name: 'TRRAIN', type: 'Mid Market', category: 'Prospect', status: 'In Touch', oppValue: 0},
  {name: 'Securitas India', type: 'Mid Market', category: 'Prospect', status: 'In Touch', oppValue: 0},
  {name: 'Bajaj Capital', type: 'Enterprise', category: 'Prospect', status: 'In Touch', oppValue: 0},
  {name: 'Apollo Tyres', type: 'Enterprise', category: 'Prospect', status: 'In Touch', oppValue: 0},
  {name: 'Dalmia Cement', type: 'Enterprise', category: 'Prospect', status: 'In Touch', oppValue: 0},
  {name: 'Uno Minda', type: 'Enterprise', category: 'Prospect', status: 'In Touch', oppValue: 0},
  {name: 'Adani Power', type: 'Enterprise', category: 'Prospect', status: 'In Touch', oppValue: 0},
];

const STAGES = ['Discovery', 'POC', 'Proposal', 'Negotiation', 'Closed-Won', 'Closed-Lost'];

function uid() { return Math.random().toString(36).slice(2, 11); }

function loadState() {
  let raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { try { return migrate(JSON.parse(raw)); } catch (e) {} }
  // Migrate v1 if found
  raw = localStorage.getItem(LEGACY_KEY);
  if (raw) { try { return migrateFromV1(JSON.parse(raw)); } catch (e) {} }

  // Fresh seed
  const accounts = SEED_ACCOUNTS.map(a => {
    const acc = {
      id: uid(), name: a.name, type: a.type, category: a.category,
      status: a.status, oppValue: a.oppValue || 0, notes: '',
      lastTouchedAt: null,
      projects: []
    };
    if (a.seedProjects) {
      acc.projects = a.seedProjects.map(p => ({
        id: uid(), name: p.name, notes: '',
        stage: p.stage || 'Discovery',
        value: p.value || 0,
        probability: p.prob || 0,
        closeDate: null,
        tasks: []
      }));
    }
    return acc;
  });
  return {
    accounts,
    inbox: { id: 'inbox', name: 'Inbox', tasks: [] },
    currentView: 'today',
    currentAccountId: null
  };
}

function migrateFromV1(v1) {
  // v1 had no inbox, no times, no project commercials
  const accounts = (v1.accounts || []).map(a => ({
    ...a,
    lastTouchedAt: a.lastTouchedAt || null,
    projects: (a.projects || []).map(p => ({
      ...p,
      stage: p.stage || 'Discovery',
      value: p.value || 0,
      probability: p.probability || 0,
      closeDate: p.closeDate || null,
      tasks: (p.tasks || []).map(t => ({...t, time: t.time || null, snoozedUntil: t.snoozedUntil || null}))
    }))
  }));
  return {
    accounts,
    inbox: { id: 'inbox', name: 'Inbox', tasks: [] },
    currentView: 'today',
    currentAccountId: null
  };
}

function migrate(s) {
  // ensure inbox exists
  if (!s.inbox) s.inbox = { id: 'inbox', name: 'Inbox', tasks: [] };
  s.accounts.forEach(a => {
    a.lastTouchedAt = a.lastTouchedAt || null;
    a.projects.forEach(p => {
      p.stage = p.stage || 'Discovery';
      p.value = p.value || 0;
      p.probability = p.probability || 0;
      p.closeDate = p.closeDate || null;
      p.tasks.forEach(t => {
        t.time = t.time || null;
        t.snoozedUntil = t.snoozedUntil || null;
      });
    });
  });
  s.inbox.tasks.forEach(t => {
    t.time = t.time || null;
    t.snoozedUntil = t.snoozedUntil || null;
  });
  return s;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();
let showDoneInProjects = {}; // projectId -> bool
let kanbanFilter = 'all'; // all, hot, mid

// ================= HELPERS =================
function statusKey(s) { return (s || '').replace(/[\s-]+/g, ''); }
function fmtINR(n) {
  if (!n || n === 0) return '—';
  if (n >= 10000000) return '₹' + (n / 10000000).toFixed(2).replace(/\.?0+$/, '') + ' Cr';
  if (n >= 100000) return '₹' + (n / 100000).toFixed(1).replace(/\.0$/, '') + ' L';
  return '₹' + n.toLocaleString('en-IN');
}
function todayStart() { const d = new Date(); d.setHours(0,0,0,0); return d; }
// Local-time YYYY-MM-DD (avoids the UTC shift that toISOString causes for IST).
function localISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function nowMs() { return Date.now(); }

// Combine date + time into a comparable timestamp (ms)
function deadlineMs(t) {
  if (!t.deadline) return null;
  const d = new Date(t.deadline);
  if (t.time) {
    const [h, m] = t.time.split(':').map(Number);
    d.setHours(h, m, 0, 0);
  } else {
    d.setHours(23, 59, 59, 999); // end of day if only date
  }
  return d.getTime();
}

function fmtDateTime(t) {
  if (!t.deadline) return '—';
  const d = new Date(t.deadline);
  const today = todayStart();
  const diff = Math.round((d - today) / 86400000);
  let datePart;
  if (diff === 0) datePart = 'Today';
  else if (diff === 1) datePart = 'Tomorrow';
  else if (diff === -1) datePart = 'Yesterday';
  else if (diff > 0 && diff < 7) datePart = d.toLocaleDateString('en-IN', {weekday: 'short'});
  else if (diff < 0 && diff > -30) datePart = Math.abs(diff) + 'd ago';
  else datePart = d.toLocaleDateString('en-IN', {day: 'numeric', month: 'short'});

  if (t.time) {
    const [h, m] = t.time.split(':').map(Number);
    const hr12 = ((h + 11) % 12) + 1;
    const ampm = h < 12 ? 'am' : 'pm';
    return `${datePart} ${hr12}:${m.toString().padStart(2,'0')}${ampm}`;
  }
  return datePart;
}

function deadlineClass(t) {
  if (!t.deadline || t.status === 'Done') return '';
  if (t.snoozedUntil && new Date(t.snoozedUntil) > new Date()) return '';
  const ms = deadlineMs(t);
  const now = nowMs();
  if (ms < now) return 'overdue';
  if (ms - now < 24 * 3600 * 1000) return 'due-soon';
  return '';
}

function isSnoozed(t) {
  return t.snoozedUntil && new Date(t.snoozedUntil) > new Date();
}

function allTasks() {
  const out = [];
  state.accounts.forEach(a => {
    a.projects.forEach(p => {
      p.tasks.forEach(t => {
        out.push({...t, accountId: a.id, accountName: a.name, projectId: p.id, projectName: p.name, isInbox: false});
      });
    });
  });
  state.inbox.tasks.forEach(t => {
    out.push({...t, accountId: null, accountName: 'Inbox', projectId: 'inbox', projectName: '', isInbox: true});
  });
  return out;
}

// Smart sort: P0 first, then deadline, then P1, etc.
function smartSort(a, b) {
  const aOver = a.deadline && deadlineMs(a) < nowMs() && a.status !== 'Done';
  const bOver = b.deadline && deadlineMs(b) < nowMs() && b.status !== 'Done';
  if (aOver !== bOver) return aOver ? -1 : 1;

  const ord = {P0:0, P1:1, P2:2};
  if (ord[a.priority] !== ord[b.priority]) return ord[a.priority] - ord[b.priority];

  if (!a.deadline && !b.deadline) return 0;
  if (!a.deadline) return 1;
  if (!b.deadline) return -1;
  return deadlineMs(a) - deadlineMs(b);
}

function findAccount(id) { return state.accounts.find(a => a.id === id); }
function findProject(accId, projId) {
  if (accId === null || projId === 'inbox') return state.inbox;
  const a = findAccount(accId);
  return a ? a.projects.find(p => p.id === projId) : null;
}
function findTask(accId, projId, taskId) {
  const p = findProject(accId, projId);
  return p ? p.tasks.find(t => t.id === taskId) : null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tm);
  t._tm = setTimeout(() => t.classList.remove('show'), 2000);
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function projectWeightedValue(p) {
  return Math.round((p.value || 0) * (p.probability || 0) / 100);
}
function accountValue(a) {
  // Computed total of project values
  const projValTotal = a.projects.reduce((s, p) => s + (p.value || 0), 0);
  return projValTotal || a.oppValue || 0; // fall back to legacy account-level
}
function accountWeightedValue(a) {
  const projWtd = a.projects.reduce((s, p) => s + projectWeightedValue(p), 0);
  return projWtd;
}

function daysSince(ts) {
  if (!ts) return null;
  return Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
}

function touchAccount(accId) {
  const a = findAccount(accId);
  if (a) { a.lastTouchedAt = new Date().toISOString(); }
}

// ================= RENDERING =================
function render() {
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const tasks = allTasks().filter(t => t.status !== 'Done' && !isSnoozed(t));
  const today = todayStart();
  const tomorrow = new Date(today.getTime() + 86400000);

  const todayCount = tasks.filter(t => {
    if (!t.deadline) return false;
    const ms = deadlineMs(t);
    return ms >= today.getTime() && ms < tomorrow.getTime();
  }).length;

  const overdueCount = tasks.filter(t => t.deadline && deadlineMs(t) < nowMs()).length;
  const upcomingCount = tasks.filter(t => {
    if (!t.deadline) return false;
    const ms = deadlineMs(t);
    return ms >= tomorrow.getTime();
  }).length;
  const snoozedCount = allTasks().filter(t => isSnoozed(t) && t.status !== 'Done').length;
  const inboxCount = state.inbox.tasks.filter(t => t.status !== 'Done' && !isSnoozed(t)).length;
  const hotCount = state.accounts.filter(a => a.status === 'Hot').length;
  const warmCount = state.accounts.filter(a => a.status === 'Warm').length;
  const intouchCount = state.accounts.filter(a => a.status === 'In Touch').length;
  const coldCount = state.accounts.filter(a => a.status === 'Cold').length;

  // Pipeline = open projects (not Closed-Won/Lost)
  const pipelineCount = state.accounts.reduce((s, a) =>
    s + a.projects.filter(p => p.stage !== 'Closed-Won' && p.stage !== 'Closed-Lost').length, 0);

  const set = (id, val, cls) => {
    const el = document.getElementById(id);
    el.textContent = val || '';
    el.className = 'count' + (cls ? ' ' + cls : '');
  };
  set('nav-today-count', todayCount, todayCount > 0 ? '' : '');
  set('nav-overdue-count', overdueCount, overdueCount ? 'alert' : '');
  set('nav-upcoming-count', upcomingCount);
  set('nav-snoozed-count', snoozedCount);
  set('nav-inbox-count', inboxCount);
  set('nav-all-count', tasks.length);
  set('nav-pipeline-count', pipelineCount);
  set('nav-hot-count', hotCount);
  set('nav-warm-count', warmCount);
  set('nav-intouch-count', intouchCount);
  set('nav-cold-count', coldCount);

  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view === state.currentView && !state.currentAccountId);
  });

  // Account list
  const order = {Hot: 0, Warm: 1, 'In Touch': 2, Cold: 3};
  const sorted = [...state.accounts].sort((a, b) => {
    if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
    const at = a.projects.reduce((s, p) => s + p.tasks.filter(t => t.status !== 'Done').length, 0);
    const bt = b.projects.reduce((s, p) => s + p.tasks.filter(t => t.status !== 'Done').length, 0);
    return bt - at;
  });

  const list = document.getElementById('accounts-list');
  list.innerHTML = sorted.map(a => {
    const openTasks = a.projects.reduce((s, p) => s + p.tasks.filter(t => t.status !== 'Done').length, 0);
    const hasOverdue = a.projects.some(p => p.tasks.some(t =>
      t.status !== 'Done' && !isSnoozed(t) && t.deadline && deadlineMs(t) < nowMs()));
    const since = daysSince(a.lastTouchedAt);
    const isStale = a.status === 'Hot' && since !== null && since > 14;
    const active = state.currentAccountId === a.id ? 'active' : '';
    return `
      <div class="account-row ${active}" onclick="selectAccount('${a.id}')">
        <span class="status-dot ${statusKey(a.status)}"></span>
        <span class="name">${escapeHtml(a.name)}</span>
        <span class="badges">
          ${isStale ? `<span class="badge-dot stale" title="No activity in ${since}d">${since}d</span>` : ''}
          ${openTasks > 0 ? `<span class="badge-dot ${hasOverdue ? 'urgent' : ''}">${openTasks}</span>` : ''}
        </span>
      </div>
    `;
  }).join('');
}

function renderMain() {
  const main = document.getElementById('main-content');
  if (state.currentAccountId) {
    main.innerHTML = renderAccountDetail(state.currentAccountId);
    return;
  }
  switch (state.currentView) {
    case 'today': main.innerHTML = renderToday(); break;
    case 'upcoming': main.innerHTML = renderUpcoming(); break;
    case 'overdue': main.innerHTML = renderOverdue(); break;
    case 'snoozed': main.innerHTML = renderSnoozed(); break;
    case 'inbox': main.innerHTML = renderInbox(); break;
    case 'all-tasks': main.innerHTML = renderAllTasks(); break;
    case 'pipeline': main.innerHTML = renderPipeline(); bindKanbanDnD(); break;
    case 'hot-accounts': main.innerHTML = renderAccountsByStatus('Hot'); break;
    case 'warm-accounts': main.innerHTML = renderAccountsByStatus('Warm'); break;
    case 'intouch-accounts': main.innerHTML = renderAccountsByStatus('In Touch'); break;
    case 'cold-accounts': main.innerHTML = renderAccountsByStatus('Cold'); break;
    default: main.innerHTML = renderToday();
  }
}

// ----- Smart Today -----

  const next = overdue.find(t => t.priority === 'P0') ||
               dueToday.find(t => t.priority === 'P0') ||

               dueToday[0] ||
               p0NoDeadline[0];

  });

  const now = new Date();

  return `
    <div class="page-header">
      <div class="page-title">
        <h2>${greeting}, Rajat.</h2>
        <div class="meta">${dateStr} · <strong>${all.length}</strong> open ${all.length === 1 ? 'task' : 'tasks'}${overdue.length > 0 ? ` · <span class="alert-text">${overdue.length} overdue</span>` : ''}</div>
      </div>
      <div class="header-actions">
        <button class="btn" onclick="openTaskModal()">+ Task</button>
        <button class="btn-ghost btn" onclick="showHelp()" title="Keyboard shortcuts">?</button>
      </div>
    </div>

    ${next ? `
      <div class="smart-banner" onclick="openTaskModal('${next.accountId || ''}','${next.projectId}','${next.id}')" style="cursor:pointer">
        <div class="icon">→</div>
        <div class="content">
          <div class="title">Next up: ${escapeHtml(next.title)}</div>
          <div class="text">${next.isInbox ? 'Inbox' : escapeHtml(next.accountName) + ' · ' + escapeHtml(next.projectName)} · ${next.priority}${next.deadline ? ' · ' + fmtDateTime(next) : ''}</div>
        </div>
      </div>
    ` : ''}

    <div class="stats-row">
      <div class="stat-card clickable" onclick="switchView('overdue')">
        <div class="label">Overdue</div>
        <div class="value ${overdue.length ? 'alert' : 'good'}">${overdue.length}</div>
        <div class="sub">${overdue.length === 0 ? 'You\'re clear' : 'Need attention'}</div>
      </div>
      <div class="stat-card">
        <div class="label">Due Today</div>
        <div class="value ${dueToday.length ? 'warn' : ''}">${dueToday.length}</div>
        <div class="sub">${dueToday.length} ${dueToday.length === 1 ? 'task' : 'tasks'}</div>
      </div>
      <div class="stat-card clickable" onclick="switchView('pipeline')">
        <div class="label">Pipeline</div>
        <div class="value">${fmtINR(totalOpp)}</div>
        <div class="sub">Weighted: ${fmtINR(weighted)}</div>
      </div>
      <div class="stat-card">
        <div class="label">Hot Accounts</div>
        <div class="value ${staleHot.length ? 'warn' : ''}">${state.accounts.filter(a => a.status === 'Hot').length}</div>
        <div class="sub">${staleHot.length ? staleHot.length + ' going stale' : 'all fresh'}</div>
      </div>
    </div>

    ${overdue.length > 0 ? `
      <div class="section-title">
        Overdue
        <span class="badge alert">${overdue.length}</span>
      </div>
      <div class="tasks-container">
        ${overdue.map(renderTaskRow).join('')}
      </div>
    ` : ''}

    <div class="section-title">
      Due Today
      <span class="badge">${dueToday.length}</span>
    </div>
    <div class="tasks-container">
      ${dueToday.length === 0 ? '<div class="empty-state"><div class="big">Nothing scheduled today</div>Pick something from Upcoming or knock out a P0.</div>' : dueToday.map(renderTaskRow).join('')}
    </div>

    ${p0NoDeadline.length > 0 ? `
      <div class="section-title">
        P0 without deadline
        <span class="badge">${p0NoDeadline.length}</span>
      </div>
      <div class="tasks-container">
        ${p0NoDeadline.map(renderTaskRow).join('')}
      </div>
    ` : ''}

    ${staleHot.length > 0 ? `
      <div class="section-title">
        Hot accounts going cold
        <span class="badge">${staleHot.length}</span>

            <div class="task-deadline" style="color:var(--warm)">${daysSince(a.lastTouchedAt)}d ago</div>
            <span></span>
            <span></span>
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;
}

// ----- Upcoming -----
function renderUpcoming() {
  const today = todayStart();
  const tomorrow = new Date(today.getTime() + 86400000);
  const tasks = allTasks()
    .filter(t => t.status !== 'Done' && !isSnoozed(t) && t.deadline && deadlineMs(t) >= tomorrow.getTime())
    .sort(smartSort);

  // Group by relative day
  const groups = {};
  tasks.forEach(t => {
    const d = new Date(t.deadline);
    d.setHours(0,0,0,0);
    const key = d.toISOString();
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  const groupOrder = Object.keys(groups).sort();

  return `
    <div class="page-header">
      <div class="page-title">
        <h2>Upcoming</h2>
        <div class="meta">${tasks.length} scheduled ${tasks.length === 1 ? 'task' : 'tasks'} ahead</div>
      </div>
    </div>
    ${groupOrder.length === 0 ? '<div class="tasks-container"><div class="empty-state"><div class="big">Nothing scheduled</div>Add a task with a future date.</div></div>' :
      groupOrder.map(key => {
        const d = new Date(key);
        const diff = Math.round((d - today) / 86400000);
        let label;
        if (diff === 1) label = 'Tomorrow';
        else if (diff < 7) label = d.toLocaleDateString('en-IN', {weekday: 'long'});
        else label = d.toLocaleDateString('en-IN', {weekday: 'short', day: 'numeric', month: 'short'});
        return `
          <div class="section-title">
            ${label} <span class="badge">${groups[key].length}</span>
          </div>
          <div class="tasks-container">${groups[key].map(renderTaskRow).join('')}</div>
        `;
      }).join('')
    }
  `;
}

    <div class="page-header">
      <div class="page-title">
        <h2>Overdue</h2>
        <div class="meta">${overdue.length} ${overdue.length === 1 ? 'task' : 'tasks'} past their deadline</div>

      ${overdue.length === 0 ? '<div class="empty-state"><div class="big">Inbox zero</div>Nothing overdue.</div>' : overdue.map(renderTaskRow).join('')}

}

              <div class="row"><span class="key">Weighted</span><span class="val weighted">${fmtINR(accountWeightedValue(a))}</span></div>

            ${since !== null && since > staleDays ? `<div style="font-size:11px; color:var(--warm); margin-top:6px">⚠ Last touch ${since}d ago</div>` : ''}
          </div>
        `;
      }).join('')}

}

// ----- Pipeline kanban -----
function renderPipeline() {
  const cols = STAGES.map(stage => {
    let projs = state.accounts.flatMap(a => a.projects.filter(p => p.stage === stage).map(p => ({...p, accountName: a.name, accountId: a.id, accountStatus: a.status})));
    if (kanbanFilter === 'hot') projs = projs.filter(p => p.accountStatus === 'Hot');
    else if (kanbanFilter === 'mid') projs = projs.filter(p => p.accountStatus === 'Hot' || p.accountStatus === 'Warm');
    return {stage, projs};
  });

  const allOpenProjs = cols.filter(c => !c.stage.startsWith('Closed')).flatMap(c => c.projs);
  const totalOpp = allOpenProjs.reduce((s, p) => s + (p.value || 0), 0);
  const totalWtd = allOpenProjs.reduce((s, p) => s + projectWeightedValue(p), 0);

  return `
    <div class="page-header">
      <div class="page-title">
        <h2>Pipeline</h2>
        <div class="meta"><strong>${fmtINR(totalOpp)}</strong> total · <strong>${fmtINR(totalWtd)}</strong> weighted · ${allOpenProjs.length} open ${allOpenProjs.length === 1 ? 'project' : 'projects'}</div>
      </div>
      <div class="header-actions">
        <button class="btn ${kanbanFilter === 'all' ? 'btn-primary' : ''} btn-sm" onclick="setKanbanFilter('all')">All</button>
        <button class="btn ${kanbanFilter === 'hot' ? 'btn-primary' : ''} btn-sm" onclick="setKanbanFilter('hot')">Hot Only</button>
        <button class="btn ${kanbanFilter === 'mid' ? 'btn-primary' : ''} btn-sm" onclick="setKanbanFilter('mid')">Hot + Warm</button>
      </div>
    </div>
    <div class="kanban">
      ${cols.map(c => {
        const colTotal = c.projs.reduce((s, p) => s + (p.value || 0), 0);
        return `
          <div class="kanban-col">
            <div class="kanban-col-header">
              <div class="name"><span class="stage-tag ${c.stage.replace(/\s+/g,'')}">${c.stage}</span></div>
              <div class="total">${c.projs.length} · ${fmtINR(colTotal)}</div>
            </div>
            <div class="kanban-col-body" data-stage="${c.stage}">
              ${c.projs.map(p => {
                const closeMs = p.closeDate ? new Date(p.closeDate).getTime() : null;
                const closeOverdue = closeMs && closeMs < nowMs() && !c.stage.startsWith('Closed');
                return `
                  <div class="kanban-card" draggable="true" data-account-id="${p.accountId}" data-project-id="${p.id}" onclick="selectAccount('${p.accountId}')">
                    <div class="acc">${escapeHtml(p.accountName)}</div>
                    <div class="proj">${escapeHtml(p.name)}</div>
                    <div class="row"><span class="lbl">Value</span><span>${fmtINR(p.value)}</span></div>
                    <div class="row"><span class="lbl">Weighted</span><span style="color:var(--accent)">${fmtINR(projectWeightedValue(p))}</span></div>
                    <div class="row"><span class="lbl">Probability</span><span>${p.probability || 0}%</span></div>
                    ${p.closeDate ? `<div class="row"><span class="lbl">Close</span><span class="close-date ${closeOverdue ? 'overdue' : ''}">${new Date(p.closeDate).toLocaleDateString('en-IN', {day:'numeric',month:'short'})}</span></div>` : ''}
                  </div>
                `;
              }).join('')}
              ${c.projs.length === 0 ? '<div style="text-align:center; color:var(--text-faint); padding:20px 0; font-size:11.5px">empty</div>' : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function setKanbanFilter(f) { kanbanFilter = f; renderMain(); }

function bindKanbanDnD() {
  let dragData = null;
  document.querySelectorAll('.kanban-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      dragData = { accId: card.dataset.accountId, projId: card.dataset.projectId };
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => card.classList.remove('dragging'));
  });
  document.querySelectorAll('.kanban-col-body').forEach(col => {
    col.addEventListener('dragover', e => {
      e.preventDefault();
      col.classList.add('drag-over');
    });
    col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
    col.addEventListener('drop', e => {
      e.preventDefault();
      col.classList.remove('drag-over');
      if (!dragData) return;
      const newStage = col.dataset.stage;
      const p = findProject(dragData.accId, dragData.projId);
      if (p && p.stage !== newStage) {
        p.stage = newStage;
        // Auto-update probability based on stage
        const probMap = {Discovery: 20, POC: 35, Proposal: 55, Negotiation: 75, 'Closed-Won': 100, 'Closed-Lost': 0};
        if (probMap[newStage] !== undefined && (p.probability === 0 || p.probability === probMap[Object.keys(probMap).find(k => probMap[k] === p.probability)])) {
          // Only auto-update if probability matches a known stage default
          p.probability = probMap[newStage];
        }
        touchAccount(dragData.accId);
        saveState();
        showToast(`Moved to ${newStage}`);
        render();
      }
    });
  });
}

function renderProjectCard(accId, p) {

  const snoozed = tasks.filter(t => t.status !== 'Done' && isSnoozed(t));

  const moreOpen = open.length - visible.length;

  return `
    <div class="project-card">
      <div class="project-header">
        <div style="flex:1; min-width:0">

            <span style="font-size:11px; color:var(--text-faint)">${open.length} open · ${done.length} done${snoozed.length ? ' · ' + snoozed.length + ' snoozed' : ''}</span>
          </div>
        </div>
        <div style="display:flex; gap:1px">
          <button class="icon-btn" onclick="openProjectModal('${accId}','${p.id}')" title="Edit">✎</button>
          <button class="icon-btn danger" onclick="deleteProject('${accId}','${p.id}')" title="Delete">✕</button>
        </div>
      </div>

      <div class="project-commercials">
        <div class="row"><span class="key">Value</span><span class="val">${fmtINR(p.value)}</span></div>
        <div class="row"><span class="key">Weighted</span><span class="val weighted">${fmtINR(projectWeightedValue(p))}</span></div>
        <div class="row"><span class="key">Probability</span><span class="val">${p.probability || 0}%</span></div>
        <div class="row"><span class="key">Close</span><span class="val">${p.closeDate ? new Date(p.closeDate).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'2-digit'}) : '—'}</span></div>
      </div>

      ${p.notes ? `<div style="font-size:11.5px; color:var(--text-dim); margin:4px 0 4px; white-space:pre-wrap;">${escapeHtml(p.notes)}</div>` : ''}

      <div class="project-tasks">
        ${visible.length === 0 && done.length === 0 && snoozed.length === 0 ? '<div style="font-size:11.5px; color:var(--text-faint); padding:6px 0">No tasks yet.</div>' : ''}
        ${visible.map(t => renderMiniTask(accId, p.id, t)).join('')}
        ${snoozed.map(t => renderMiniTask(accId, p.id, t)).join('')}
        ${moreOpen > 0 ? `<div style="font-size:11px; color:var(--text-faint); padding:2px 6px;">+${moreOpen} more open</div>` : ''}
        ${done.length > 0 ? `<div class="show-done-link" onclick="toggleProjectDone('${p.id}')">${showDone ? '▾' : '▸'} ${done.length} completed</div>` : ''}
        ${showDone ? done.map(t => renderMiniTask(accId, p.id, t)).join('') : ''}
      </div>
      <button class="add-task-inline" onclick="openTaskModal('${accId}','${p.id}')">+ Add task</button>

  `;
}

function renderMiniTask(accId, projId, t) {
  const snoozed = isSnoozed(t);
  const cls = (t.status === 'Done' ? 'done ' : '') + (snoozed ? 'snoozed' : '');
  return `
    <div class="mini-task ${cls}" onclick="openTaskModal('${accId}','${projId}','${t.id}')">
      <div class="mini-check ${t.status === 'Done' ? 'checked' : ''}" onclick="event.stopPropagation(); toggleTaskDone('${accId || ''}','${projId}','${t.id}')">${t.status === 'Done' ? '✓' : ''}</div>
      <span class="pri-tag ${t.priority}">${t.priority}</span>
      <span class="title">${escapeHtml(t.title)}</span>
      ${snoozed ? `<span class="due" style="color:var(--purple)">zz ${fmtSnoozedUntil(t.snoozedUntil)}</span>` :
        t.deadline ? `<span class="due ${deadlineClass(t)}">${fmtDateTime(t)}</span>` : ''}
    </div>
  `;
}

function toggleProjectDone(projId) {
  showDoneInProjects[projId] = !showDoneInProjects[projId];
  renderMain();
}

function fmtSnoozedUntil(s) {
  if (!s) return '';
  const d = new Date(s);
  const today = todayStart();
  const diff = Math.round((d - today) / 86400000);
  if (diff <= 0) return 'soon';
  if (diff === 1) return 'tmrw';
  if (diff < 7) return d.toLocaleDateString('en-IN', {weekday: 'short'}).toLowerCase();
  return d.toLocaleDateString('en-IN', {day:'numeric',month:'short'}).toLowerCase();
}

// ----- Task row -----
function renderTaskRow(t, isSnoozedView) {
  // Coerce to bool — callers often pass this via .map(renderTaskRow), which
  // supplies the array index as the 2nd arg. Without this, rows 2+ get
  // index >=1 (truthy) and render in snoozed-view mode.
  isSnoozedView = isSnoozedView === true;
  const sk = (t.status || 'Todo').replace(/\s+/g, '');
  const snoozed = isSnoozed(t);
  return `
    <div class="task-row ${t.status === 'Done' ? 'done' : ''} ${snoozed && !isSnoozedView ? 'snoozed' : ''}" onclick="openTaskModal('${t.accountId || ''}','${t.projectId}','${t.id}')">
      <div class="task-checkbox ${t.status === 'Done' ? 'checked' : ''}" onclick="event.stopPropagation(); toggleTaskDone('${t.accountId || ''}','${t.projectId}','${t.id}')">${t.status === 'Done' ? '✓' : ''}</div>
      <div class="task-main">
        <div class="task-title">${escapeHtml(t.title)}</div>
        <div class="task-context">
          ${t.isInbox ? '<span class="inbox-tag">inbox</span>' : escapeHtml(t.accountName) + ' <span class="sep">›</span> ' + escapeHtml(t.projectName)}
        </div>
      </div>
      <span class="pri-tag ${t.priority}">${t.priority}</span>
      ${isSnoozedView ? `<div class="task-deadline snoozed-tag">until ${fmtSnoozedUntil(t.snoozedUntil)}</div>` :
        snoozed ? `<div class="task-deadline snoozed-tag">snoozed</div>` :
        `<div class="task-deadline ${deadlineClass(t)}">${fmtDateTime(t)}</div>`}
      <span class="status-pill ${sk}">${escapeHtml(t.status)}</span>
      <div class="task-actions">
        ${t.status !== 'Done' && !snoozed ? `<button class="icon-btn" onclick="event.stopPropagation(); snoozeTask('${t.accountId || ''}','${t.projectId}','${t.id}')" title="Snooze">⏱</button>` : ''}
        ${snoozed ? `<button class="icon-btn" onclick="event.stopPropagation(); unsnoozeTask('${t.accountId || ''}','${t.projectId}','${t.id}')" title="Unsnooze">↩</button>` : ''}
      </div>
    </div>
  `;
}

function saveAccount(id) {
  const data = {
    name: document.getElementById('acc-name').value.trim(),
    status: document.getElementById('acc-status').value,
    category: document.getElementById('acc-category').value,
    type: document.getElementById('acc-type').value,
    notes: document.getElementById('acc-notes').value
  };
  const oppEl = document.getElementById('acc-opp');
  if (oppEl) data.oppValue = Number(oppEl.value) || 0;
  if (!data.name) { alert('Account name is required'); return; }
  if (id) {
    const a = findAccount(id);
    Object.assign(a, data);
    showToast('Account updated');
  } else {
    state.accounts.push({id: uid(), ...data, oppValue: data.oppValue || 0, projects: [], lastTouchedAt: null});
    showToast('Account added');
  }
  saveState(); closeModal(); render();
}

function deleteAccount(id) {
  const a = findAccount(id);
  if (!a) return;
  if (!confirm(`Delete "${a.name}" and all its projects/tasks?`)) return;
  state.accounts = state.accounts.filter(x => x.id !== id);
  if (state.currentAccountId === id) state.currentAccountId = null;
  saveState(); closeModal(); render();
  showToast('Account deleted');
}

// ===== Task modal with smart date chips =====
function dateChipOptions(currentDate) {
  const today = todayStart();
  const today1 = new Date(today);
  const tomorrow = new Date(today.getTime() + 86400000);
  // Find next monday
  const daysToMon = (8 - today.getDay()) % 7 || 7;
  const nextMon = new Date(today.getTime() + daysToMon * 86400000);
  const inWeek = new Date(today.getTime() + 7 * 86400000);

  const fmt = d => localISO(d);
  return [
    {label: 'Today', value: fmt(today1)},
    {label: 'Tomorrow', value: fmt(tomorrow)},
    {label: 'Next Mon', value: fmt(nextMon)},
    {label: '+7 days', value: fmt(inWeek)},
    {label: 'No date', value: ''}
  ];
}

function pickDateChip(val) {

  });

let calendarState = null;

function toggleCalendar() {
  const cal = document.getElementById('calendar');
  const isShown = cal.classList.contains('show');
  if (isShown) {
    cal.classList.remove('show');
    return;
  }
  // Initialize calendar state
  const currentVal = document.getElementById('task-deadline').value;
  const start = currentVal ? new Date(currentVal) : new Date();
  calendarState = {
    year: start.getFullYear(),
    month: start.getMonth(),
    selected: currentVal
  };
  renderCalendar();
  cal.classList.add('show');
}

function renderCalendar() {
  const cal = document.getElementById('calendar');
  if (!cal || !calendarState) return;
  const {year, month, selected} = calendarState;
  const monthName = new Date(year, month, 1).toLocaleDateString('en-IN', {month: 'long', year: 'numeric'});
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay(); // Sun=0 ... Sat=6
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const selDate = selected ? selected : '';

  let cells = '';
  // Days of week header
  const dows = ['S','M','T','W','T','F','S'];
  cells += dows.map(d => `<div class="cal-dow">${d}</div>`).join('');

  // Previous month tail
  for (let i = startOffset - 1; i >= 0; i--) {
    const day = daysInPrevMonth - i;
    cells += `<button type="button" class="cal-day other-month" disabled>${day}</button>`;
  }
  // Current month
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(year, month, day);
    const iso = localISO(d);
    const isToday = d.getTime() === today.getTime();
    const isSelected = iso === selDate;
    const isWeekend = d.getDay() === 0 || d.getDay() === 6;
    const cls = ['cal-day'];
    if (isToday) cls.push('today');
    if (isSelected) cls.push('selected');
    if (isWeekend && !isSelected) cls.push('weekend');
    cells += `<button type="button" class="${cls.join(' ')}" onclick="selectCalendarDate('${iso}')">${day}</button>`;
  }
  // Next month head to fill grid
  const totalCells = startOffset + daysInMonth;
  const trailing = (7 - (totalCells % 7)) % 7;
  for (let i = 1; i <= trailing; i++) {
    cells += `<button type="button" class="cal-day other-month" disabled>${i}</button>`;
  }

  cal.innerHTML = `
    <div class="cal-header">
      <button type="button" class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="month-label">${monthName}</div>
      <button type="button" class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">${cells}</div>
    <div class="cal-footer">
      <button type="button" class="cal-clear" onclick="clearCalendarDate()">Clear</button>
      <button type="button" class="cal-clear" onclick="jumpToToday()" style="color:var(--accent)">Today</button>
    </div>
  `;
}

function changeMonth(delta) {
  if (!calendarState) return;
  calendarState.month += delta;
  if (calendarState.month < 0) { calendarState.month = 11; calendarState.year--; }
  else if (calendarState.month > 11) { calendarState.month = 0; calendarState.year++; }
  renderCalendar();
}

function selectCalendarDate(iso) {
  if (!calendarState) return;
  calendarState.selected = iso;
  document.getElementById('task-deadline').value = iso;
  // Clear chip highlights since this is a custom pick
  const chips = document.querySelectorAll('#date-chips .date-chip');

    if (c.dataset.value !== undefined) {
      c.classList.toggle('active', c.dataset.value === iso);

  updateDateDisplay(iso);

}

function clearCalendarDate() {
  if (!calendarState) return;

  document.getElementById('task-deadline').value = '';

    if (c.dataset.value !== undefined) {

function jumpToToday() {
  if (!calendarState) return;
  const t = new Date();
  calendarState.year = t.getFullYear();
  calendarState.month = t.getMonth();

}

function updateDateDisplay(val) {
  const disp = document.getElementById('date-display');

function saveTask(origAccId, origProjId, taskId) {
  const title = document.getElementById('task-title').value.trim();
  if (!title) { alert('Task title is required'); return; }
  const newAccId = document.getElementById('task-account').value;
  let newProjId = document.getElementById('task-project').value;

  const data = {
    title,
    priority: document.getElementById('task-priority').value,
    status: document.getElementById('task-status').value,
    deadline: document.getElementById('task-deadline').value || null,
    time: document.getElementById('task-time').value || null,
    notes: document.getElementById('task-notes').value,
    updatedAt: new Date().toISOString()
  };

  // Resolve target project
  let targetProj;
  if (newAccId === 'INBOX') {
    newProjId = 'inbox';
    targetProj = state.inbox;
  } else {
    const a = findAccount(newAccId);
    if (!a) { alert('Pick an account'); return; }
    if (newProjId === '__new__' || !newProjId) {
      const name = prompt('New project name:');
      if (!name) return;
      const np = {id: uid(), name: name.trim(), notes: '', stage: 'Discovery', value: 0, probability: 0, closeDate: null, tasks: []};
      a.projects.push(np);
      newProjId = np.id;
      targetProj = np;
    } else {
      targetProj = findProject(newAccId, newProjId);
    }
  }

  if (taskId) {
    const oldAccId = origAccId === 'INBOX' || origAccId === '' ? null : origAccId;
    const oldProj = findProject(oldAccId, origProjId);
    const idx = oldProj.tasks.findIndex(x => x.id === taskId);
    const existing = oldProj.tasks[idx];
    const same = (origAccId === newAccId || (origAccId === 'INBOX' && newAccId === 'INBOX') || (origAccId === '' && newAccId === 'INBOX')) && origProjId === newProjId;
    if (same) {
      Object.assign(existing, data);
    } else {
      oldProj.tasks.splice(idx, 1);
      targetProj.tasks.push({...existing, ...data});
    }
    showToast('Task updated');
  } else {
    targetProj.tasks.push({id: uid(), snoozedUntil: null, ...data, createdAt: new Date().toISOString()});
    showToast('Task added');
  }

  if (newAccId !== 'INBOX') touchAccount(newAccId);
  saveState(); closeModal(); render();
}

function deleteTask(accId, projId, taskId) {
  if (!confirm('Delete this task?')) return;
  const realAccId = accId === 'INBOX' || accId === '' ? null : accId;
  const p = findProject(realAccId, projId);
  p.tasks = p.tasks.filter(t => t.id !== taskId);
  saveState(); closeModal(); render();
  showToast('Task deleted');
}

function toggleTaskDone(accId, projId, taskId) {
  const realAccId = accId === '' ? null : accId;
  const t = findTask(realAccId, projId, taskId);
  if (!t) return;
  t.status = t.status === 'Done' ? 'Todo' : 'Done';
  t.updatedAt = new Date().toISOString();
  if (realAccId) touchAccount(realAccId);
  saveState(); render();
}

function doSnooze(accId, projId, taskId, days) {
  const realAccId = accId === '' ? null : accId;
  const t = findTask(realAccId, projId, taskId);
  if (!t) return;
  const d = new Date();
  d.setDate(d.getDate() + days);
  d.setHours(0,0,0,0);
  t.snoozedUntil = d.toISOString();
  saveState(); closeModal(); render();
  showToast(`Snoozed for ${days} ${days === 1 ? 'day' : 'days'}`);
}
function doSnoozeNextMon(accId, projId, taskId) {
  const realAccId = accId === '' ? null : accId;
  const t = findTask(realAccId, projId, taskId);
  if (!t) return;
  const d = new Date();
  const daysToMon = (8 - d.getDay()) % 7 || 7;
  d.setDate(d.getDate() + daysToMon);
  d.setHours(0,0,0,0);
  t.snoozedUntil = d.toISOString();
  saveState(); closeModal(); render();
  showToast('Snoozed until Monday');
}
function unsnoozeTask(accId, projId, taskId) {
  const realAccId = accId === '' ? null : accId;
  const t = findTask(realAccId, projId, taskId);
  if (!t) return;
  t.snoozedUntil = null;
  saveState(); render();
  showToast('Unsnoozed');
}

// ================= QUICK CAPTURE =================
// Parse: title @account "project" P0 tomorrow 4pm
function parseQuickCapture(text) {
  const result = { title: text, accountId: null, projectId: null, priority: 'P1', deadline: null, time: null };

  // Priority
  const priMatch = text.match(/\b(P0|P1|P2)\b/i);
  if (priMatch) {
    result.priority = priMatch[1].toUpperCase();
    text = text.replace(priMatch[0], '').trim();
  }

  // Time (4pm, 4:30pm, 16:00)
  const timeMatch = text.match(/\b(\d{1,2})(?::(\d{2}))?\s?(am|pm)\b/i) || text.match(/\b(\d{1,2}):(\d{2})\b/);
  if (timeMatch) {
    let h = parseInt(timeMatch[1], 10);
    const m = parseInt(timeMatch[2] || 0, 10);
    const ampm = (timeMatch[3] || '').toLowerCase();
    if (ampm === 'pm' && h < 12) h += 12;
    if (ampm === 'am' && h === 12) h = 0;
    result.time = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;
    text = text.replace(timeMatch[0], '').trim();
  }

  // Date keywords
  const today = todayStart();
  const dateMap = {
    'today': 0, 'tod': 0,
    'tomorrow': 1, 'tmrw': 1, 'tom': 1,
    'monday': nextDayOfWeek(1), 'mon': nextDayOfWeek(1),
    'tuesday': nextDayOfWeek(2), 'tue': nextDayOfWeek(2),
    'wednesday': nextDayOfWeek(3), 'wed': nextDayOfWeek(3),
    'thursday': nextDayOfWeek(4), 'thu': nextDayOfWeek(4),
    'friday': nextDayOfWeek(5), 'fri': nextDayOfWeek(5),
    'saturday': nextDayOfWeek(6), 'sat': nextDayOfWeek(6),
    'sunday': nextDayOfWeek(0), 'sun': nextDayOfWeek(0),
  };
  for (const [word, days] of Object.entries(dateMap)) {
    const re = new RegExp(`\\b${word}\\b`, 'i');
    if (re.test(text)) {
      const d = new Date(today.getTime() + days * 86400000);
      result.deadline = localISO(d);
      text = text.replace(re, '').trim();
      break;
    }
  }

  // Account: @name (greedy match against existing accounts)
  const atMatch = text.match(/@(\w[\w\s]*?)(?=\s+|$)/);
  if (atMatch) {
    const name = atMatch[1].trim().toLowerCase();
    const found = state.accounts.find(a => a.name.toLowerCase().startsWith(name));
    if (found) {
      result.accountId = found.id;
      // First project as default
      if (found.projects.length > 0) result.projectId = found.projects[0].id;
      text = text.replace(atMatch[0], '').trim();
    }
  }

  // Cleanup
  text = text.replace(/\s+/g, ' ').trim();
  result.title = text || 'Untitled task';
  return result;
}

function nextDayOfWeek(targetDay) {
  const today = new Date();
  let diff = (targetDay - today.getDay() + 7) % 7;
  if (diff === 0) diff = 7;
  return diff;
}

function handleQuickCapture(e) {
  if (e.key !== 'Enter') return;
  const input = e.target;
  const raw = input.value.trim();
  if (!raw) return;
  const parsed = parseQuickCapture(raw);

  const task = {
    id: uid(),
    title: parsed.title,
    priority: parsed.priority,
    status: 'Todo',
    deadline: parsed.deadline,
    time: parsed.time,
    notes: '',
    snoozedUntil: null,
    createdAt: new Date().toISOString()
  };

  if (parsed.accountId) {
    const a = findAccount(parsed.accountId);
    let proj;
    if (parsed.projectId) proj = a.projects.find(p => p.id === parsed.projectId);
    if (!proj) {
      // Create or use General
      proj = a.projects.find(p => p.name.toLowerCase() === 'general') ||
             {id: uid(), name: 'General', notes: '', stage: 'Discovery', value: 0, probability: 0, closeDate: null, tasks: []};
      if (!a.projects.includes(proj)) a.projects.push(proj);
    }
    proj.tasks.push(task);
    touchAccount(parsed.accountId);
  } else {
    state.inbox.tasks.push(task);
  }

  saveState();
  input.value = '';
  showToast(parsed.accountId ? `Added to ${findAccount(parsed.accountId).name}` : 'Added to Inbox');
  render();
}

function exportData() {

  const a = document.createElement('a');
  a.href = url;
  a.download = `account-command-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Exported');
}

// ================= KEYBOARD =================
let lastKey = '';
let lastKeyTime = 0;
document.addEventListener('keydown', e => {
  const inField = ['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName);
  const modalOpen = document.getElementById('modal-overlay').classList.contains('show');

  if (e.key === 'Escape' && modalOpen) {
    closeModal();
    return;
  }

  if (inField || modalOpen) return;

  if (e.key === '/') {
    e.preventDefault();
    document.getElementById('qc-input').focus();
    return;
  }
  if (e.key === 'n') {
    e.preventDefault();
    openTaskModal();
    return;
  }
  if (e.key === 'e') {
    e.preventDefault();
    exportData();
    return;
  }
  if (e.key === '?') {
    e.preventDefault();
    showHelp();
    return;
  }

  // 'g' followed by another key
  const now = Date.now();
  if (lastKey === 'g' && now - lastKeyTime < 1500) {
    if (e.key === 't') { switchView('today'); }
    else if (e.key === 'p') { switchView('pipeline'); }
    else if (e.key === 'i') { switchView('inbox'); }
    else if (e.key === 'a') { switchView('all-tasks'); }
    else if (e.key === 'h') { switchView('hot-accounts'); }
    else if (e.key === 'o') { switchView('overdue'); }
    else if (e.key === 'u') { switchView('upcoming'); }
    lastKey = '';
    return;
  }
  if (e.key === 'g') {
    lastKey = 'g';
    lastKeyTime = now;
  }
});

// Init
render();
